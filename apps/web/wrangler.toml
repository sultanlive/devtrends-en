# Bindings for the Pages site. Used by platformProxy in `astro dev` and by
# `wrangler pages dev`. Must reference the SAME D1 database + R2 bucket as the
# parser. In the Pages dashboard, add the identical bindings for production.
name = "devtrends-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "devtrends"
database_id = "a3c30e32-6cfe-48d5-860b-1a8775e9d3cf"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "devtrends-images"

# @astrojs/cloudflare auto-enables KV-backed sessions and expects this binding.
# Local dev simulates it automatically. For production:
#   wrangler kv namespace create SESSION
# then paste the id below (free tier).
[[kv_namespaces]]
binding = "SESSION"
id = "122273d1fb3544e5a9ef714bacc98101"

[vars]
# Leave SITE_URL empty to use the current request host for canonical/hreflang/
# sitemap (works in dev and prod automatically). Set it to a real domain to pin
# the canonical host in production (recommended once you have a custom domain,
# so the *.pages.dev preview doesn't self-canonicalize).
SITE_URL = "https://devtrends.cc"
R2_PUBLIC_BASE = "https://pub-e9ef8e20353d4db4867193b8578534d8.r2.dev"
SITE_NAME = "DevTrends EN"
TWITTER_HANDLE = ""            # e.g. "@devtrends" — adds <meta name="twitter:site">; optional
GA_ID = "G-4E723QK34H"         # Google Analytics 4 measurement ID (prod only)
